version: "3.9"

services:
  realtime-gateway:
    build: ./realtime-gateway
    ports:
      - "8080:8080"
    environment:
      - STT_GRPC_HOST=stt-service:50051
      - ORCHESTRATOR_GRPC_HOST=orchestrator:50052
    depends_on:
      - stt-service
      - orchestrator

  stt-service:
    build:
      context: ./backend
      dockerfile: stt_service/Dockerfile
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    ports:
      - "50051:50051"

  orchestrator:
    build:
      context: ./backend
      dockerfile: orchestrator/Dockerfile
    environment:
      - LLM_GRPC_HOST=llm-service:50053
      - TTS_GRPC_HOST=tts-service:50054
      - MEMORY_GRPC_HOST=memory-service:50055
      - SCHEDULER_GRPC_HOST=scheduler-service:50056
    depends_on:
      - llm-service
      - tts-service
      - memory-service
      - scheduler-service
    ports:
      - "50052:50052"

  llm-service:
    build:
      context: ./backend
      dockerfile: llm_service/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "50053:8004"

  tts-service:
    build:
      context: ./backend
      dockerfile: tts_service/Dockerfile
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - AZURE_TTS_KEY=${AZURE_TTS_KEY}
      - AZURE_TTS_REGION=${AZURE_TTS_REGION}
    ports:
      - "50054:50054"

  memory-service:
    build:
      context: ./backend
      dockerfile: memory/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/voiceai
    depends_on:
      - redis
      - qdrant
      - postgres
    ports:
      - "50055:50055"

  scheduler-service:
    build:
      context: ./backend
      dockerfile: scheduler/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/voiceai
    depends_on:
      - postgres
    ports:
      - "50056:50056"

  outbound-worker:
    build:
      context: ./backend
      dockerfile: outbound/Dockerfile
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/voiceai
      - SIP_PROVIDER=${SIP_PROVIDER}
      - SIP_ACCOUNT_SID=${SIP_ACCOUNT_SID}
      - SIP_AUTH_TOKEN=${SIP_AUTH_TOKEN}
    depends_on:
      - redis
      - postgres
    command: celery -A outbound.tasks worker --loglevel=info -c 8

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=voiceai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

volumes:
  qdrant_data:
  pg_data:
